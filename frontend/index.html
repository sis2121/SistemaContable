<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Librería El Estudiante · Sistema Contable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      .sidebar-transition {
        transition:
          transform 0.3s ease,
          opacity 0.3s ease;
      }
      .card-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
      }
      .shadow-soft {
        box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.08);
      }
      .scrollbar-thin::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      .scrollbar-thin::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 10px;
      }
      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      .toast-enter {
        animation: slideIn 0.3s ease-out;
      }
      .sidebar-gradient {
        background: linear-gradient(
          135deg,
          #1e1b4b 0%,
          #312e81 50%,
          #1e1b4b 100%
        );
      }
      .active-nav {
        background-color: rgba(255, 255, 255, 0.15);
        border-left: 4px solid #fbbf24;
      }
    </style>
  </head>
  <body class="bg-stone-100 text-stone-800 font-sans antialiased">
    <div id="toast" class="fixed top-6 right-6 z-50 hidden"></div>

    <div class="flex h-screen overflow-hidden">
      <div
        id="sidebarOverlay"
        class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden"
        onclick="toggleSidebar()"
      ></div>

      <aside
        id="sidebar"
        class="sidebar-gradient text-amber-50 w-72 flex-shrink-0 flex flex-col p-6 shadow-2xl z-50 fixed lg:static inset-y-0 left-0 transform -translate-x-full lg:translate-x-0 transition-transform duration-300"
      >
        <div class="flex flex-col items-center gap-4 mb-10">
          <img
            src="logo.png"
            alt="Logo Librería El Estudiante"
            class="w-28 h-28 object-contain rounded-2xl shadow-lg"
          />
          <div class="text-center">
            <h2 class="text-xl font-bold tracking-tight">
              Librería El Estudiante
            </h2>
            <p class="text-xs text-amber-200/70">Sistema Contable</p>
          </div>
        </div>
        <nav class="space-y-2 flex-1">
          <button
            onclick="mostrarModulo('plan')"
            id="nav-plan"
            class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10 transition-all duration-200 text-left"
          >
            <i data-lucide="book-open-text" class="w-5 h-5"></i>
            <span class="font-medium">Plan de Cuentas</span>
          </button>
          <button
            onclick="mostrarModulo('balance')"
            id="nav-balance"
            class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10 transition-all duration-200 text-left"
          >
            <i data-lucide="scale" class="w-5 h-5"></i>
            <span class="font-medium">Balance Inicial</span>
          </button>
          <button
            onclick="mostrarModulo('diario')"
            id="nav-diario"
            class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10 transition-all duration-200 text-left"
          >
            <i data-lucide="scroll-text" class="w-5 h-5"></i>
            <span class="font-medium">Libro Diario</span>
          </button>
        </nav>
        <div
          class="mt-auto pt-6 border-t border-white/20 text-xs text-amber-200/60 flex items-center gap-2"
        >
          <i data-lucide="settings" class="w-4 h-4"></i>
          v3.0 · El Estudiante
        </div>
      </aside>

      <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-stone-50/90 w-full">
        <div class="lg:hidden mb-6 flex items-center gap-4">
          <button
            onclick="toggleSidebar()"
            class="p-2 rounded-lg bg-white shadow-soft hover:bg-stone-100"
          >
            <i data-lucide="menu" class="w-6 h-6 text-stone-700"></i>
          </button>
          <h1 class="text-2xl font-bold text-stone-800">
            Librería El Estudiante
          </h1>
        </div>

        <div id="contenido" class="max-w-6xl mx-auto space-y-8"></div>
      </main>
    </div>

    <script>
      const API = "https://sistema-contable-backend-xglb.onrender.com";

      function showToast(message, type = "error") {
        const toast = document.getElementById("toast");
        const colors = {
          error: "bg-rose-600 border-rose-400 text-rose-50",
          success: "bg-emerald-600 border-emerald-400 text-emerald-50",
        };
        toast.className = `fixed top-6 right-6 z-50 px-6 py-3 rounded-2xl border shadow-lg toast-enter ${colors[type] || colors.error}`;
        toast.innerHTML = `
        <div class="flex items-center gap-2">
          <i data-lucide="${type === "error" ? "alert-triangle" : "check-circle"}" class="w-5 h-5"></i>
          <span class="text-sm font-medium">${message}</span>
          <button onclick="document.getElementById('toast').classList.add('hidden')" class="ml-4 hover:opacity-80">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>`;
        toast.classList.remove("hidden");
        lucide.createIcons();
        setTimeout(() => {
          toast.classList.add("hidden");
        }, 4000);
      }

      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebarOverlay");
        sidebar.classList.toggle("-translate-x-full");
        overlay.classList.toggle("hidden");
      }

      function cerrarSidebarMobile() {
        if (window.innerWidth < 1024) {
          document.getElementById("sidebar").classList.add("-translate-x-full");
          document.getElementById("sidebarOverlay").classList.add("hidden");
        }
      }

      function parseCodigo(codigo) {
        return codigo
          .split(".")
          .map((s) => (/^\d+$/.test(s) ? parseInt(s, 10) : s.toLowerCase()));
      }
      function compararCodigo(a, b) {
        const la = parseCodigo(a.codigo),
          lb = parseCodigo(b.codigo);
        for (let i = 0; i < Math.max(la.length, lb.length); i++) {
          if (la[i] === undefined) return -1;
          if (lb[i] === undefined) return 1;
          if (la[i] < lb[i]) return -1;
          if (la[i] > lb[i]) return 1;
        }
        return 0;
      }

      function mostrarModulo(modulo) {
        cerrarSidebarMobile();
        document
          .querySelectorAll(".nav-item")
          .forEach((b) => b.classList.remove("active-nav"));
        document.getElementById(`nav-${modulo}`).classList.add("active-nav");
        const cont = document.getElementById("contenido");
        cont.innerHTML =
          '<div class="flex justify-center items-center py-20"><i data-lucide="loader-2" class="w-10 h-10 animate-spin text-amber-600"></i></div>';
        lucide.createIcons();

        switch (modulo) {
          case "plan":
            cargarPlanCuentas();
            break;
          case "balance":
            cargarBalance();
            break;
          case "diario":
            cargarLibroDiario();
            break;
        }
      }

      // ===================== PLAN DE CUENTAS (sin cambios) =====================
      // ... (se omite por brevedad, es el mismo código anterior)
      // [Incluir aquí el código completo del Plan de Cuentas tal como estaba en la última versión]

      // ===================== BALANCE INICIAL (sin cambios) =====================
      // ... (se omite por brevedad, es el mismo código anterior)
      // [Incluir aquí el código completo del Balance Inicial tal como estaba en la última versión]

      // ===================== LIBRO DIARIO (MEJORADO: FOLIO + TABLA) =====================
      async function cargarLibroDiario() {
        const cont = document.getElementById("contenido");
        cont.innerHTML = `
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8">
          <div>
            <h1 class="text-3xl font-bold text-stone-800">Libro Diario</h1>
            <p class="text-stone-500">Asientos contables con folio por línea</p>
          </div>
          <button onclick="cargarLibroDiario()" class="px-4 py-2 bg-white border border-stone-300 hover:bg-stone-50 text-stone-700 rounded-xl transition flex items-center gap-2 shadow-sm">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i> Actualizar
          </button>
        </div>

        <div class="grid md:grid-cols-2 gap-6 mb-8">
          <!-- Nuevo asiento -->
          <div class="bg-white p-6 rounded-3xl shadow-soft border border-stone-200 card-hover transition-all">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2"><i data-lucide="file-plus" class="w-5 h-5 text-emerald-600"></i> Nuevo asiento</h2>
            <div class="space-y-3">
              <input type="date" id="fechaDiario" class="w-full rounded-xl border border-stone-300 px-4 py-2.5">
              <input id="glosaDiario" placeholder="Glosa" class="w-full rounded-xl border border-stone-300 px-4 py-2.5">
              <div id="lineasDiarioContainer" class="space-y-2">
                <div class="linea flex flex-wrap sm:flex-nowrap gap-2 items-center">
                  <select class="select-codigo-diario w-full sm:w-1/3 rounded-xl border border-stone-300 px-2 py-2 bg-white">
                    <option value="">Seleccionar cuenta...</option>
                  </select>
                  <input type="text" placeholder="Folio" class="folioDiario w-16 rounded-xl border border-stone-300 px-2 py-2 text-center">
                  <select class="debeHaberDiario w-full sm:w-1/4 rounded-xl border border-stone-300 px-2 py-2 bg-white">
                    <option value="DEBE">DEBE</option>
                    <option value="HABER">HABER</option>
                  </select>
                  <input type="number" step="0.01" placeholder="Monto" class="montoDiario w-full sm:w-1/3 rounded-xl border border-stone-300 px-3 py-2">
                  <button onclick="this.parentElement.remove()" class="text-rose-500 hover:text-rose-700 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
              </div>
              <button onclick="agregarLineaDiario()" class="text-sm text-amber-700 hover:underline flex items-center gap-1"><i data-lucide="plus" class="w-3 h-3"></i> Agregar línea</button>
              <button onclick="registrarAsientoDiario()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-medium transition shadow-md">
                Registrar asiento
              </button>
            </div>
          </div>

          <!-- Editar / Eliminar -->
          <div class="bg-white p-6 rounded-3xl shadow-soft border border-stone-200 card-hover transition-all">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2"><i data-lucide="folder-edit" class="w-5 h-5 text-amber-600"></i> Editar / Eliminar</h2>
            <div class="space-y-3">
              <input type="number" id="idEditarDiario" placeholder="ID del asiento" class="w-full rounded-xl border border-stone-300 px-4 py-2.5">
              <div class="flex gap-3">
                <button onclick="cargarAsientoEditarDiario()" class="flex-1 py-2 bg-sky-100 text-sky-800 rounded-xl hover:bg-sky-200 font-medium">Cargar</button>
                <button onclick="eliminarAsientoDiario()" class="flex-1 py-2 bg-rose-100 text-rose-800 rounded-xl hover:bg-rose-200 font-medium">Eliminar</button>
              </div>
              <div id="editorDiario" class="hidden space-y-3 mt-3">
                <input type="date" id="editFechaDiario" class="w-full rounded-xl border border-stone-300 px-4 py-2.5">
                <input id="editGlosaDiario" placeholder="Glosa" class="w-full rounded-xl border border-stone-300 px-4 py-2.5">
                <div id="editLineasDiarioContainer" class="space-y-2"></div>
                <button onclick="agregarLineaEditarDiario()" class="text-sm text-amber-700 hover:underline flex items-center gap-1"><i data-lucide="plus" class="w-3 h-3"></i> Agregar línea</button>
                <button onclick="guardarEdicionDiario()" class="w-full py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-medium">Guardar cambios</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Listado de asientos (formato tabla) -->
        <div id="listaAsientosDiario" class="space-y-6"></div>
      `;
        await Promise.all([poblarSelectoresDiario(), listarAsientosDiario()]);
        lucide.createIcons();
      }

      async function poblarSelectoresDiario() {
        try {
          const res = await fetch(`${API}/cuentas`);
          if (!res.ok) return;
          const cuentas = await res.json();
          cuentas.sort(compararCodigo);

          const selects = document.querySelectorAll(
            "select.select-codigo-diario",
          );
          selects.forEach((select) => {
            const currentValue = select.value;
            select.innerHTML =
              '<option value="">Seleccionar cuenta...</option>';
            cuentas.forEach((c) => {
              select.innerHTML += `<option value="${c.codigo}">${c.nombre}</option>`;
            });
            if (currentValue) select.value = currentValue;
          });
        } catch (e) {
          console.error("Error al poblar selectores del diario", e);
        }
      }

      function agregarLineaDiario() {
        const container = document.getElementById("lineasDiarioContainer");
        const div = document.createElement("div");
        div.className =
          "linea flex flex-wrap sm:flex-nowrap gap-2 items-center";
        div.innerHTML = `
        <select class="select-codigo-diario w-full sm:w-1/3 rounded-xl border border-stone-300 px-2 py-2 bg-white">
          <option value="">Seleccionar cuenta...</option>
        </select>
        <input type="text" placeholder="Folio" class="folioDiario w-16 rounded-xl border border-stone-300 px-2 py-2 text-center">
        <select class="debeHaberDiario w-full sm:w-1/4 rounded-xl border border-stone-300 px-2 py-2 bg-white">
          <option value="DEBE">DEBE</option>
          <option value="HABER">HABER</option>
        </select>
        <input type="number" step="0.01" placeholder="Monto" class="montoDiario w-full sm:w-1/3 rounded-xl border border-stone-300 px-3 py-2">
        <button onclick="this.parentElement.remove()" class="text-rose-500 hover:text-rose-700 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;
        container.appendChild(div);
        poblarSelectoresDiario();
        lucide.createIcons();
      }

      async function registrarAsientoDiario() {
        const fecha = document.getElementById("fechaDiario").value;
        const glosa = document.getElementById("glosaDiario").value.trim();
        if (!fecha || !glosa)
          return showToast("Completá fecha y glosa", "error");

        const lineas = [];
        document.querySelectorAll(".linea").forEach((el) => {
          const codigo = el.querySelector(".select-codigo-diario").value;
          const folio = el.querySelector(".folioDiario").value.trim();
          const debeHaber = el.querySelector(".debeHaberDiario").value;
          const monto = parseFloat(el.querySelector(".montoDiario").value);
          if (codigo && !isNaN(monto)) {
            lineas.push({ codigo, folio, debe_haber: debeHaber, monto });
          }
        });

        if (lineas.length < 2) return showToast("Mínimo dos líneas", "error");

        try {
          const res = await fetch(`${API}/asientos`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ fecha, glosa, lineas }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "Error al registrar");

          // Mostrar el asiento recién creado
          const asiento = data;
          mostrarDetalleAsiento(asiento);

          showToast("Asiento registrado correctamente", "success");
          document.getElementById("fechaDiario").value = "";
          document.getElementById("glosaDiario").value = "";
          document.getElementById("lineasDiarioContainer").innerHTML = `
          <div class="linea flex flex-wrap sm:flex-nowrap gap-2 items-center">
            <select class="select-codigo-diario w-full sm:w-1/3 rounded-xl border border-stone-300 px-2 py-2 bg-white">
              <option value="">Seleccionar cuenta...</option>
            </select>
            <input type="text" placeholder="Folio" class="folioDiario w-16 rounded-xl border border-stone-300 px-2 py-2 text-center">
            <select class="debeHaberDiario w-full sm:w-1/4 rounded-xl border border-stone-300 px-2 py-2 bg-white">
              <option value="DEBE">DEBE</option>
              <option value="HABER">HABER</option>
            </select>
            <input type="number" step="0.01" placeholder="Monto" class="montoDiario w-full sm:w-1/3 rounded-xl border border-stone-300 px-3 py-2">
            <button onclick="this.parentElement.remove()" class="text-rose-500 hover:text-rose-700 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          </div>`;
          poblarSelectoresDiario();
          lucide.createIcons();
          listarAsientosDiario(); // actualizar lista completa
        } catch (e) {
          showToast(e.message, "error");
        }
      }

      function mostrarDetalleAsiento(asiento) {
        // Construir tabla del asiento
        let lineasHtml = "";
        let totalDebe = 0,
          totalHaber = 0;
        asiento.lineas.forEach((l) => {
          totalDebe += l.debe_haber === "DEBE" ? l.monto : 0;
          totalHaber += l.debe_haber === "HABER" ? l.monto : 0;
          lineasHtml += `
          <tr class="border-b border-stone-200">
            <td class="py-2 px-4">${l.nombre}</td>
            <td class="py-2 px-4 text-center">${l.folio || "-"}</td>
            <td class="py-2 px-4 text-right font-mono">${l.debe_haber === "DEBE" ? l.monto.toFixed(2) : ""}</td>
            <td class="py-2 px-4 text-right font-mono">${l.debe_haber === "HABER" ? l.monto.toFixed(2) : ""}</td>
          </tr>`;
        });
        const tabla = `
        <div class="bg-white rounded-3xl shadow-soft border border-stone-200 p-6 mb-6">
          <div class="flex justify-between items-start mb-4">
            <div>
              <h3 class="text-xl font-bold text-stone-800">Asiento registrado</h3>
              <p class="text-sm text-stone-500">${asiento.fecha} - ${asiento.glosa}</p>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="border-b-2 border-stone-300">
                <tr>
                  <th class="py-2 px-4 text-left">Cuenta</th>
                  <th class="py-2 px-4 text-center">Folio</th>
                  <th class="py-2 px-4 text-right">Debe</th>
                  <th class="py-2 px-4 text-right">Haber</th>
                </tr>
              </thead>
              <tbody>
                ${lineasHtml}
                <tr class="font-semibold border-t-2 border-stone-300">
                  <td class="py-2 px-4" colspan="2">Total</td>
                  <td class="py-2 px-4 text-right">${totalDebe.toFixed(2)}</td>
                  <td class="py-2 px-4 text-right">${totalHaber.toFixed(2)}</td>
                </tr>
              </tbody>
            </table>
          </div>
          ${totalDebe === totalHaber ? '<p class="mt-3 text-emerald-600 font-medium flex items-center gap-1"><i data-lucide="check-circle" class="w-4 h-4"></i> Total Debe = Total Haber</p>' : ""}
        </div>`;
        document
          .getElementById("listaAsientosDiario")
          .insertAdjacentHTML("afterbegin", tabla);
        lucide.createIcons();
      }

      async function listarAsientosDiario() {
        const lista = document.getElementById("listaAsientosDiario");
        lista.innerHTML =
          '<p class="text-stone-400 italic p-4 text-center">Cargando...</p>';
        try {
          const res = await fetch(`${API}/asientos`);
          if (!res.ok) throw new Error("Error al cargar");
          const asientos = await res.json();
          lista.innerHTML = "";
          if (!asientos.length) {
            lista.innerHTML =
              '<p class="text-stone-400 italic p-4 text-center">No hay asientos registrados.</p>';
            return;
          }
          asientos.forEach((a) => {
            let lineasHtml = "";
            let totalDebe = 0,
              totalHaber = 0;
            a.lineas.forEach((l) => {
              totalDebe += l.debe_haber === "DEBE" ? l.monto : 0;
              totalHaber += l.debe_haber === "HABER" ? l.monto : 0;
              lineasHtml += `
              <tr class="border-b border-stone-200">
                <td class="py-2 px-4">${l.nombre}</td>
                <td class="py-2 px-4 text-center">${l.folio || "-"}</td>
                <td class="py-2 px-4 text-right font-mono">${l.debe_haber === "DEBE" ? l.monto.toFixed(2) : ""}</td>
                <td class="py-2 px-4 text-right font-mono">${l.debe_haber === "HABER" ? l.monto.toFixed(2) : ""}</td>
              </tr>`;
            });
            const tarjeta = `
            <div class="bg-white rounded-3xl shadow-soft border border-stone-200 p-6">
              <div class="flex flex-col sm:flex-row justify-between items-start mb-4 gap-2">
                <div>
                  <h3 class="font-bold text-amber-900 text-lg">Asiento #${a.id_asiento}</h3>
                  <p class="text-stone-600 text-sm">${a.fecha} - ${a.glosa}</p>
                </div>
              </div>
              <div class="overflow-x-auto">
                <table class="w-full text-sm">
                  <thead class="border-b-2 border-stone-300">
                    <tr>
                      <th class="py-2 px-4 text-left">Cuenta</th>
                      <th class="py-2 px-4 text-center">Folio</th>
                      <th class="py-2 px-4 text-right">Debe</th>
                      <th class="py-2 px-4 text-right">Haber</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${lineasHtml}
                    <tr class="font-semibold border-t-2 border-stone-300">
                      <td class="py-2 px-4" colspan="2">Total</td>
                      <td class="py-2 px-4 text-right">${totalDebe.toFixed(2)}</td>
                      <td class="py-2 px-4 text-right">${totalHaber.toFixed(2)}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
              ${totalDebe === totalHaber ? '<p class="mt-2 text-emerald-600 text-xs font-medium flex items-center gap-1"><i data-lucide="check-circle" class="w-3 h-3"></i> Cuadrado</p>' : '<p class="mt-2 text-rose-600 text-xs font-medium">No cuadrado</p>'}
            </div>`;
            lista.innerHTML += tarjeta;
          });
          lucide.createIcons();
        } catch (e) {
          lista.innerHTML = `<p class="text-rose-500 p-4">Error al cargar asientos.</p>`;
        }
      }

      // Funciones de edición (con folio)
      async function cargarAsientoEditarDiario() {
        const id = document.getElementById("idEditarDiario").value;
        if (!id) return showToast("Ingresá ID", "error");
        try {
          const res = await fetch(`${API}/asientos`);
          const asientos = await res.json();
          const asiento = asientos.find((a) => a.id_asiento == id);
          if (!asiento) return showToast("Asiento no encontrado", "error");

          document.getElementById("editFechaDiario").value = asiento.fecha;
          document.getElementById("editGlosaDiario").value = asiento.glosa;
          const cont = document.getElementById("editLineasDiarioContainer");
          cont.innerHTML = "";
          asiento.lineas.forEach((l) => {
            cont.innerHTML += `
            <div class="linea-edit flex flex-wrap sm:flex-nowrap gap-2 items-center">
              <select class="select-codigo-diario w-full sm:w-1/3 rounded-xl border border-stone-300 px-2 py-2 bg-white">
                <option value="">Seleccionar cuenta...</option>
              </select>
              <input type="text" placeholder="Folio" class="folioEdit w-16 rounded-xl border border-stone-300 px-2 py-2 text-center" value="${l.folio || ""}">
              <select class="debeHaberEdit w-full sm:w-1/4 rounded-xl border border-stone-300 px-2 py-2 bg-white">
                <option value="DEBE" ${l.debe_haber === "DEBE" ? "selected" : ""}>DEBE</option>
                <option value="HABER" ${l.debe_haber === "HABER" ? "selected" : ""}>HABER</option>
              </select>
              <input type="number" step="0.01" class="montoEdit w-full sm:w-1/3 rounded-xl border border-stone-300 px-3 py-2" value="${l.monto}">
              <button onclick="this.parentElement.remove()" class="text-rose-500 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>`;
          });
          document.getElementById("editorDiario").classList.remove("hidden");
          await poblarSelectoresDiario();
          // Seleccionar los códigos
          document.querySelectorAll(".linea-edit").forEach((el, idx) => {
            if (asiento.lineas[idx]) {
              el.querySelector(".select-codigo-diario").value =
                asiento.lineas[idx].codigo;
            }
          });
          lucide.createIcons();
        } catch (e) {
          showToast(e.message, "error");
        }
      }

      function agregarLineaEditarDiario() {
        const cont = document.getElementById("editLineasDiarioContainer");
        const div = document.createElement("div");
        div.className =
          "linea-edit flex flex-wrap sm:flex-nowrap gap-2 items-center";
        div.innerHTML = `
        <select class="select-codigo-diario w-full sm:w-1/3 rounded-xl border border-stone-300 px-2 py-2 bg-white">
          <option value="">Seleccionar cuenta...</option>
        </select>
        <input type="text" placeholder="Folio" class="folioEdit w-16 rounded-xl border border-stone-300 px-2 py-2 text-center">
        <select class="debeHaberEdit w-full sm:w-1/4 rounded-xl border border-stone-300 px-2 py-2 bg-white">
          <option value="DEBE">DEBE</option>
          <option value="HABER">HABER</option>
        </select>
        <input type="number" step="0.01" placeholder="Monto" class="montoEdit w-full sm:w-1/3 rounded-xl border border-stone-300 px-3 py-2">
        <button onclick="this.parentElement.remove()" class="text-rose-500 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;
        cont.appendChild(div);
        poblarSelectoresDiario();
        lucide.createIcons();
      }

      async function guardarEdicionDiario() {
        const id = document.getElementById("idEditarDiario").value;
        const fecha = document.getElementById("editFechaDiario").value;
        const glosa = document.getElementById("editGlosaDiario").value.trim();
        if (!fecha || !glosa)
          return showToast("Completá fecha y glosa", "error");

        const lineas = [];
        document.querySelectorAll(".linea-edit").forEach((el) => {
          const codigo = el.querySelector(".select-codigo-diario").value;
          const folio = el.querySelector(".folioEdit").value.trim();
          const debeHaber = el.querySelector(".debeHaberEdit").value;
          const monto = parseFloat(el.querySelector(".montoEdit").value);
          if (codigo && !isNaN(monto)) {
            lineas.push({ codigo, folio, debe_haber: debeHaber, monto });
          }
        });

        try {
          const res = await fetch(`${API}/asientos/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ fecha, glosa, lineas }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "Error al actualizar");
          showToast("Asiento actualizado correctamente", "success");
          document.getElementById("editorDiario").classList.add("hidden");
          listarAsientosDiario();
        } catch (e) {
          showToast(e.message, "error");
        }
      }

      async function eliminarAsientoDiario() {
        const id = document.getElementById("idEditarDiario").value;
        if (!id) return showToast("Ingresá ID", "error");
        if (!confirm("¿Eliminar asiento #" + id + "?")) return;
        try {
          await fetch(`${API}/asientos/${id}`, { method: "DELETE" });
          showToast("Asiento eliminado", "success");
          listarAsientosDiario();
        } catch (e) {
          showToast(e.message, "error");
        }
      }

      // ===================== INICIALIZACIÓN =====================
      window.addEventListener("load", () => {
        lucide.createIcons();
        mostrarModulo("plan");
      });

      window.addEventListener("resize", () => {
        if (window.innerWidth >= 1024) {
          document
            .getElementById("sidebar")
            .classList.remove("-translate-x-full");
          document.getElementById("sidebarOverlay").classList.add("hidden");
        }
      });
    </script>
  </body>
</html>
