<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Plan de Cuentas</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <div class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-xl shadow">
      <!-- TITULO -->
      <h1 class="text-2xl font-bold text-gray-800 mb-6">📊 Plan de Cuentas</h1>

      <!-- FORMULARIO -->
      <div class="grid grid-cols-3 gap-3 mb-6">
        <input
          id="codigo"
          placeholder="Código"
          class="border p-2 rounded focus:outline-blue-500"
        />

        <input
          id="nombre"
          placeholder="Nombre de la cuenta"
          class="border p-2 rounded focus:outline-blue-500 col-span-2"
        />

        <button
          onclick="guardar()"
          class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded col-span-3 transition"
        >
          ➕ Agregar Cuenta
        </button>
      </div>

      <!-- LISTA -->
      <div class="bg-gray-50 p-4 rounded">
        <h2 class="text-lg font-semibold mb-3">Cuentas registradas</h2>

        <ul id="lista" class="space-y-2"></ul>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
