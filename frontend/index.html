<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Sistema Contable</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body class="bg-gray-100">
    <div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">
      <h1 class="text-2xl font-bold flex gap-2 items-center">
        <i data-lucide="book"></i>
        Plan de Cuentas
      </h1>

      <input id="codigo" class="border p-2 w-full mt-4" placeholder="Código" />
      <input id="nombre" class="border p-2 w-full mt-2" placeholder="Nombre" />

      <button
        onclick="guardar()"
        class="bg-blue-600 text-white px-4 py-2 mt-3 rounded"
      >
        Agregar
      </button>

      <ul id="lista" class="mt-5 space-y-2"></ul>
    </div>

    <script src="app.js"></script>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
