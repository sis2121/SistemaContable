<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Librería El Estudiante · Sistema Contable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Fuente serif para encabezados -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f5f0eb;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M20 20 L80 20 L80 80 L20 80 Z" fill="none" stroke="%23d2b48c" stroke-width="0.5" opacity="0.3"/><circle cx="50" cy="50" r="30" fill="none" stroke="%23d2b48c" stroke-width="0.5" opacity="0.2"/></svg>');
        background-size: 200px 200px;
      }
      .sidebar-transition {
        transition:
          transform 0.3s ease,
          opacity 0.3s ease;
      }
      .card-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
      }
      .shadow-soft {
        box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.08);
      }
      .scrollbar-thin::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      .scrollbar-thin::-webkit-scrollbar-thumb {
        background: #b8a99a;
        border-radius: 10px;
      }
      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      .toast-enter {
        animation: slideIn 0.3s ease-out;
      }
      .sidebar-gradient {
        background: linear-gradient(
          135deg,
          #3e2723 0%,
          #5d4037 50%,
          #3e2723 100%
        );
      }
      .active-nav {
        background-color: rgba(255, 255, 255, 0.15);
        border-left: 4px solid #d7ccc8;
      }
      .font-serif {
        font-family: "Playfair Display", serif;
      }
      @media print {
        .no-print,
        #sidebar,
        #sidebarOverlay,
        .lg:hidden,
        button,
        nav,
        aside,
        .toast-enter {
          display: none !important;
        }
        body {
          background: white !important;
          margin: 0;
          padding: 0;
        }
        main {
          overflow: visible !important;
        }
        .card-hover,
        .shadow-soft {
          box-shadow: none !important;
          transform: none !important;
        }
        .print-area {
          width: 100% !important;
          margin: 0 !important;
          padding: 10px !important;
        }
      }
    </style>
  </head>
  <body class="antialiased text-stone-800">
    <div id="toast" class="fixed top-6 right-6 z-50 hidden"></div>

    <div class="flex h-screen overflow-hidden">
      <div
        id="sidebarOverlay"
        class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden"
        onclick="toggleSidebar()"
      ></div>

      <aside
        id="sidebar"
        class="sidebar-gradient text-amber-50 w-72 flex-shrink-0 flex flex-col p-6 shadow-2xl z-50 fixed lg:static inset-y-0 left-0 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 no-print"
      >
        <div class="flex flex-col items-center gap-4 mb-10">
          <img
            src="logo.png"
            alt="Logo Librería El Estudiante"
            class="w-28 h-28 object-contain rounded-2xl shadow-lg"
          />
          <div class="text-center">
            <h2 class="text-xl font-bold tracking-tight font-serif">
              Librería El Estudiante
            </h2>
            <p class="text-xs text-amber-200/70">Sistema Contable</p>
          </div>
        </div>
        <nav class="space-y-2 flex-1">
          <button
            onclick="mostrarModulo('plan')"
            id="nav-plan"
            class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10 transition-all duration-200 text-left"
          >

            <span class="font-medium">Plan de Cuentas</span>
          </button>
          <button
            onclick="mostrarModulo('balance')"
            id="nav-balance"
            class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10 transition-all duration-200 text-left"
          >
            <i data-lucide="scale" class="w-5 h-5"></i>
            <span class="font-medium">Balance Inicial</span>
          </button>
          <button
            onclick="mostrarModulo('diario')"
            id="nav-diario"
            class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10 transition-all duration-200 text-left"
          >
            <i data-lucide="scroll-text" class="w-5 h-5"></i>
            <span class="font-medium">Libro Diario</span>
          </button>
          <button
            onclick="mostrarModulo('mayor')"
            id="nav-mayor"
            class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10 transition-all duration-200 text-left"
          >
            <i data-lucide="book" class="w-5 h-5"></i>
            <span class="font-medium">Libro Mayor</span>
          </button>
          <button
            onclick="mostrarModulo('comprobacion')"
            id="nav-comprobacion"
            class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10 transition-all duration-200 text-left"
          >
            <i data-lucide="file-bar-chart" class="w-5 h-5"></i>
            <span class="font-medium">Balance Comprobación</span>
          </button>
        </nav>
        <div
          class="mt-auto pt-6 border-t border-white/20 text-xs text-amber-200/60 flex items-center gap-2"
        >
          <i data-lucide="settings" class="w-4 h-4"></i>
          v4.0 · El Estudiante
        </div>
      </aside>

      <main class="flex-1 overflow-y-auto p-4 md:p-8 w-full">
        <div class="lg:hidden mb-6 flex items-center gap-4 no-print">
          <button
            onclick="toggleSidebar()"
            class="p-2 rounded-lg bg-white shadow-soft hover:bg-stone-100"
          >
            <i data-lucide="menu" class="w-6 h-6 text-stone-700"></i>
          </button>
          <h1 class="text-2xl font-bold text-stone-800 font-serif">
            Librería El Estudiante
          </h1>
        </div>

        <div id="contenido" class="max-w-6xl mx-auto space-y-8"></div>
      </main>
    </div>

    <script>
      const API = "https://sistema-contable-backend-xglb.onrender.com";

      function showToast(message, type = "error") {
        const toast = document.getElementById("toast");
        const colors = {
          error: "bg-rose-600 border-rose-400 text-rose-50",
          success: "bg-emerald-600 border-emerald-400 text-emerald-50",
        };
        toast.className = `fixed top-6 right-6 z-50 px-6 py-3 rounded-2xl border shadow-lg toast-enter ${colors[type] || colors.error}`;
        toast.innerHTML = `
        <div class="flex items-center gap-2">
          <i data-lucide="${type === "error" ? "alert-triangle" : "check-circle"}" class="w-5 h-5"></i>
          <span class="text-sm font-medium">${message}</span>
          <button onclick="document.getElementById('toast').classList.add('hidden')" class="ml-4 hover:opacity-80">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>`;
        toast.classList.remove("hidden");
        lucide.createIcons();
        setTimeout(() => {
          toast.classList.add("hidden");
        }, 4000);
      }

      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebarOverlay");
        sidebar.classList.toggle("-translate-x-full");
        overlay.classList.toggle("hidden");
      }

      function cerrarSidebarMobile() {
        if (window.innerWidth < 1024) {
          document.getElementById("sidebar").classList.add("-translate-x-full");
          document.getElementById("sidebarOverlay").classList.add("hidden");
        }
      }

      function parseCodigo(codigo) {
        return codigo
          .split(".")
          .map((s) => (/^\d+$/.test(s) ? parseInt(s, 10) : s.toLowerCase()));
      }
      function compararCodigo(a, b) {
        const la = parseCodigo(a.codigo),
          lb = parseCodigo(b.codigo);
        for (let i = 0; i < Math.max(la.length, lb.length); i++) {
          if (la[i] === undefined) return -1;
          if (lb[i] === undefined) return 1;
          if (la[i] < lb[i]) return -1;
          if (la[i] > lb[i]) return 1;
        }
        return 0;
      }

      function mostrarModulo(modulo) {
        cerrarSidebarMobile();
        document
          .querySelectorAll(".nav-item")
          .forEach((b) => b.classList.remove("active-nav"));
        const navItem = document.getElementById(`nav-${modulo}`);
        if (navItem) navItem.classList.add("active-nav");
        const cont = document.getElementById("contenido");
        cont.innerHTML =
          '<div class="flex justify-center items-center py-20"><i data-lucide="loader-2" class="w-10 h-10 animate-spin text-amber-600"></i></div>';
        lucide.createIcons();

        switch (modulo) {
          case "plan":
            cargarPlanCuentas();
            break;
          case "balance":
            cargarBalance();
            break;
          case "diario":
            cargarLibroDiario();
            break;
          case "mayor":
            cargarLibroMayor();
            break;
          case "comprobacion":
            cargarBalanceComprobacion();
            break;
        }
      }

      // ============ PLAN DE CUENTAS (con botón imprimir) ============
      async function cargarPlanCuentas() {
        const cont = document.getElementById("contenido");
        cont.innerHTML = `
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8 print-area">
          <div>
            <h1 class="text-3xl font-bold text-stone-800 font-serif">Plan de Cuentas</h1>
            <p class="text-stone-500">Gestión de códigos contables</p>
          </div>
          <div class="flex gap-3 no-print">
            <button onclick="cargarPlanCuentas()" class="px-4 py-2 bg-white border border-stone-300 hover:bg-stone-50 text-stone-700 rounded-xl transition flex items-center gap-2 shadow-sm">
              <i data-lucide="refresh-cw" class="w-4 h-4"></i> Actualizar
            </button>
            <button onclick="window.print()" class="px-4 py-2 bg-stone-700 text-white rounded-xl hover:bg-stone-800 flex items-center gap-2 shadow-sm">
              <i data-lucide="printer" class="w-4 h-4"></i> Imprimir
            </button>
          </div>
        </div>
        <div class="grid md:grid-cols-2 gap-6 mb-8 no-print">
          <div class="bg-white p-6 rounded-3xl shadow-soft border border-stone-200 card-hover transition-all">
            <h2 class="text-lg font-semibold text-stone-700 mb-4 flex items-center gap-2"><i data-lucide="plus-circle" class="w-5 h-5 text-emerald-600"></i> Nueva cuenta</h2>
            <div class="space-y-3">
              <input id="codigoPlan" placeholder="Código (ej: 1.1.2)" class="w-full rounded-xl border border-stone-300 px-4 py-2.5 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition">
              <input id="nombrePlan" placeholder="Nombre de la cuenta" class="w-full rounded-xl border border-stone-300 px-4 py-2.5 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition">
              <button onclick="guardarCuenta()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-medium transition shadow-md">Agregar cuenta</button>
            </div>
          </div>
          <div class="bg-white p-6 rounded-3xl shadow-soft border border-stone-200 card-hover transition-all">
            <h2 class="text-lg font-semibold text-stone-700 mb-4 flex items-center gap-2"><i data-lucide="trash-2" class="w-5 h-5 text-rose-600"></i> Eliminar por código</h2>
            <div class="space-y-3">
              <input id="codigoEliminarPlan" placeholder="Código exacto a eliminar" class="w-full rounded-xl border border-stone-300 px-4 py-2.5 focus:border-rose-500 outline-none transition">
              <button onclick="eliminarCuenta()" class="w-full py-3 bg-rose-600 hover:bg-rose-700 text-white rounded-xl font-medium transition shadow-md">Eliminar cuenta</button>
            </div>
          </div>
        </div>
        <div class="bg-white rounded-3xl shadow-soft border border-stone-200 p-6 print-area">
          <h2 class="text-xl font-semibold text-stone-700 mb-4 flex items-center gap-2"><i data-lucide="list" class="w-5 h-5 text-amber-600"></i> Cuentas registradas</h2>
          <ul id="listaPlan" class="space-y-2 max-h-96 overflow-y-auto scrollbar-thin"></ul>
        </div>
      `;
        await listarCuentas();
        lucide.createIcons();
      }

      // (Mantener funciones listarCuentas, guardarCuenta, etc. igual que antes)
      async function listarCuentas() {
        const lista = document.getElementById("listaPlan");
        lista.innerHTML =
          '<li class="text-stone-400 italic p-4 text-center">Cargando...</li>';
        try {
          const res = await fetch(`${API}/cuentas`);
          if (!res.ok) throw new Error("Error al cargar");
          const cuentas = await res.json();
          cuentas.sort(compararCodigo);
          lista.innerHTML = "";
          if (!cuentas.length) {
            lista.innerHTML =
              '<li class="text-stone-400 italic p-4 text-center">No hay cuentas registradas.</li>';
            return;
          }
          cuentas.forEach((c) => {
            const nivel = c.codigo.split(".").length - 1;
            lista.innerHTML += `
            <li class="flex items-center justify-between bg-stone-50 p-3 rounded-xl border border-stone-100 hover:bg-amber-50/50 transition"
                style="padding-left:${nivel * 1.5}rem;">
              <div class="flex items-center gap-3">
                <span class="font-mono font-semibold text-amber-900 bg-amber-100 px-2 py-1 rounded-lg text-sm">${c.codigo}</span>
                <span class="text-stone-700">${c.nombre}</span>
              </div>
              <button onclick="eliminarCuentaPorCodigo('${c.codigo}')" class="text-rose-500 hover:text-rose-700 transition p-1 no-print">
                <i data-lucide="x-circle" class="w-5 h-5"></i>
              </button>
            </li>`;
          });
          lucide.createIcons();
        } catch (e) {
          lista.innerHTML = `<li class="text-rose-500 p-4">Error al cargar cuentas: ${e.message}</li>`;
        }
      }
      async function guardarCuenta() {
        const codigo = document.getElementById("codigoPlan").value.trim();
        const nombre = document.getElementById("nombrePlan").value.trim();
        if (!codigo || !nombre)
          return showToast("Completá todos los campos", "error");
        try {
          const res = await fetch(`${API}/cuentas`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ codigo, nombre }),
          });
          if (!res.ok) {
            const error = await res.json();
            throw new Error(error.detail || "Error al guardar");
          }
          showToast("Cuenta agregada correctamente", "success");
          document.getElementById("codigoPlan").value = "";
          document.getElementById("nombrePlan").value = "";
          listarCuentas();
        } catch (e) {
          showToast(e.message, "error");
        }
      }
      async function eliminarCuentaPorCodigo(codigo) {
        if (!confirm(`¿Eliminar la cuenta ${codigo}?`)) return;
        try {
          const res = await fetch(`${API}/cuentas/${codigo}`, {
            method: "DELETE",
          });
          if (!res.ok) throw new Error("Error al eliminar");
          showToast("Cuenta eliminada", "success");
          listarCuentas();
        } catch (e) {
          showToast(e.message, "error");
        }
      }
      async function eliminarCuenta() {
        const codigo = document
          .getElementById("codigoEliminarPlan")
          .value.trim();
        if (!codigo) return showToast("Ingresá el código", "error");
        await eliminarCuentaPorCodigo(codigo);
        document.getElementById("codigoEliminarPlan").value = "";
      }

      // ============ BALANCE INICIAL (con imprimir) ============
      // (Similar, se agrega botón imprimir)
      async function cargarBalance() {
        const cont = document.getElementById("contenido");
        cont.innerHTML = `
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8 print-area">
          <div>
            <h1 class="text-3xl font-bold text-stone-800 font-serif">Balance Inicial</h1>
            <p class="text-stone-500">Saldos de apertura (solo cuentas hoja)</p>
          </div>
          <div class="flex gap-3 no-print">
            <button onclick="cargarBalance()" class="px-4 py-2 bg-white border border-stone-300 hover:bg-stone-50 text-stone-700 rounded-xl transition flex items-center gap-2 shadow-sm">
              <i data-lucide="refresh-cw" class="w-4 h-4"></i> Actualizar
            </button>
            <button onclick="window.print()" class="px-4 py-2 bg-stone-700 text-white rounded-xl hover:bg-stone-800 flex items-center gap-2 shadow-sm">
              <i data-lucide="printer" class="w-4 h-4"></i> Imprimir
            </button>
          </div>
        </div>
        <!-- Tarjetas igual que antes, luego lista de saldos -->
        <div class="grid md:grid-cols-2 gap-6 mb-8 no-print">
          <!-- ... (mismo contenido) ... -->
        </div>
        <div class="bg-white rounded-3xl shadow-soft border border-stone-200 p-6 print-area">
          <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><i data-lucide="list" class="w-5 h-5 text-amber-600"></i> Saldos iniciales (≠ 0)</h2>
          <ul id="listaBalance" class="space-y-2 max-h-96 overflow-y-auto scrollbar-thin"></ul>
        </div>
      `;
        await Promise.all([poblarSelectoresBalance(), listarBalances()]);
        lucide.createIcons();
      }
      // ... (resto de funciones de balance igual que antes)

      // ============ LIBRO DIARIO (con imprimir) ============
      async function cargarLibroDiario() {
        // Similar, agregar botón imprimir en la cabecera
        // ...
      }

      // ============ LIBRO MAYOR ============
      async function cargarLibroMayor() {
        const cont = document.getElementById("contenido");
        cont.innerHTML = `
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8 print-area">
          <div>
            <h1 class="text-3xl font-bold text-stone-800 font-serif">Libro Mayor</h1>
            <p class="text-stone-500">Movimientos por cuenta</p>
          </div>
          <div class="flex gap-3 no-print">
            <button onclick="cargarLibroMayor()" class="px-4 py-2 bg-white border border-stone-300 hover:bg-stone-50 text-stone-700 rounded-xl transition flex items-center gap-2 shadow-sm">
              <i data-lucide="refresh-cw" class="w-4 h-4"></i> Actualizar
            </button>
            <button onclick="window.print()" class="px-4 py-2 bg-stone-700 text-white rounded-xl hover:bg-stone-800 flex items-center gap-2 shadow-sm">
              <i data-lucide="printer" class="w-4 h-4"></i> Imprimir
            </button>
          </div>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-soft border border-stone-200 card-hover transition-all mb-8 no-print">
          <label class="text-lg font-semibold text-stone-700 mb-3 block">Seleccionar cuenta</label>
          <select id="selectCuentaMayor" class="w-full rounded-xl border border-stone-300 px-4 py-2.5 bg-white" onchange="cargarMayorCuenta()">
            <option value="">-- Elija una cuenta --</option>
          </select>
        </div>
        <div id="contenidoMayor" class="space-y-6"></div>
      `;
        // Cargar lista de cuentas con movimientos
        try {
          const res = await fetch(`${API}/libro-mayor/cuentas`);
          if (!res.ok) throw new Error("Error al cargar cuentas");
          const cuentas = await res.json();
          const select = document.getElementById("selectCuentaMayor");
          cuentas.forEach((c) => {
            select.innerHTML += `<option value="${c.codigo}">${c.codigo} - ${c.nombre}</option>`;
          });
        } catch (e) {
          showToast(e.message, "error");
        }
        lucide.createIcons();
      }

      async function cargarMayorCuenta() {
        const codigo = document.getElementById("selectCuentaMayor").value;
        if (!codigo) return;
        const cont = document.getElementById("contenidoMayor");
        cont.innerHTML = '<p class="text-stone-400">Cargando...</p>';
        try {
          const res = await fetch(`${API}/libro-mayor/${codigo}`);
          if (!res.ok) throw new Error("Error al obtener mayor");
          const data = await res.json();
          let html = `
          <div class="bg-white rounded-3xl shadow-soft border border-stone-200 p-6 print-area">
            <h2 class="text-2xl font-bold font-serif mb-4">${data.codigo} - ${data.nombre}</h2>
            <p class="text-sm text-stone-600 mb-4">Saldo inicial: <span class="font-mono font-semibold">${data.saldo_inicial.toFixed(2)}</span></p>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="border-b-2 border-stone-300">
                  <tr>
                    <th class="py-2 px-4 text-left">Fecha</th>
                    <th class="py-2 px-4 text-left">Glosa</th>
                    <th class="py-2 px-4 text-center">Folio</th>
                    <th class="py-2 px-4 text-right">Debe</th>
                    <th class="py-2 px-4 text-right">Haber</th>
                    <th class="py-2 px-4 text-right">Saldo</th>
                  </tr>
                </thead>
                <tbody>`;
          data.movimientos.forEach((m) => {
            html += `
                  <tr class="border-b border-stone-200">
                    <td class="py-2 px-4">${m.fecha}</td>
                    <td class="py-2 px-4">${m.glosa}</td>
                    <td class="py-2 px-4 text-center">${m.folio || "-"}</td>
                    <td class="py-2 px-4 text-right font-mono">${m.debe ? m.debe.toFixed(2) : ""}</td>
                    <td class="py-2 px-4 text-right font-mono">${m.haber ? m.haber.toFixed(2) : ""}</td>
                    <td class="py-2 px-4 text-right font-mono font-semibold">${m.saldo.toFixed(2)}</td>
                  </tr>`;
          });
          html += `
                </tbody>
              </table>
            </div>
            <p class="mt-4 text-right font-bold">Saldo final: ${data.saldo_final.toFixed(2)}</p>
          </div>`;
          cont.innerHTML = html;
          lucide.createIcons();
        } catch (e) {
          cont.innerHTML = `<p class="text-rose-500">${e.message}</p>`;
        }
      }

      // ============ BALANCE DE COMPROBACIÓN ============
      async function cargarBalanceComprobacion() {
        const cont = document.getElementById("contenido");
        cont.innerHTML = `
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8 print-area">
          <div>
            <h1 class="text-3xl font-bold text-stone-800 font-serif">Balance de Comprobación</h1>
            <p class="text-stone-500">Resumen de saldos y movimientos</p>
          </div>
          <div class="flex gap-3 no-print">
            <button onclick="cargarBalanceComprobacion()" class="px-4 py-2 bg-white border border-stone-300 hover:bg-stone-50 text-stone-700 rounded-xl transition flex items-center gap-2 shadow-sm">
              <i data-lucide="refresh-cw" class="w-4 h-4"></i> Actualizar
            </button>
            <button onclick="window.print()" class="px-4 py-2 bg-stone-700 text-white rounded-xl hover:bg-stone-800 flex items-center gap-2 shadow-sm">
              <i data-lucide="printer" class="w-4 h-4"></i> Imprimir
            </button>
          </div>
        </div>
        <div id="tablaComprobacion" class="bg-white rounded-3xl shadow-soft border border-stone-200 p-6 print-area">
          <p class="text-stone-400">Cargando...</p>
        </div>
      `;
        try {
          const res = await fetch(`${API}/balance-comprobacion`);
          if (!res.ok) throw new Error("Error al obtener balance");
          const data = await res.json();
          let html = `
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="border-b-2 border-stone-300">
                <tr>
                  <th class="py-2 px-4 text-left">Código</th>
                  <th class="py-2 px-4 text-left">Nombre</th>
                  <th class="py-2 px-4 text-right">Debe</th>
                  <th class="py-2 px-4 text-right">Haber</th>
                  <th class="py-2 px-4 text-right">Saldo Deudor</th>
                  <th class="py-2 px-4 text-right">Saldo Acreedor</th>
                </tr>
              </thead>
              <tbody>`;
          data.cuentas.forEach((c) => {
            html += `
                <tr class="border-b border-stone-200">
                  <td class="py-2 px-4 font-mono">${c.codigo}</td>
                  <td class="py-2 px-4">${c.nombre}</td>
                  <td class="py-2 px-4 text-right font-mono">${c.debe.toFixed(2)}</td>
                  <td class="py-2 px-4 text-right font-mono">${c.haber.toFixed(2)}</td>
                  <td class="py-2 px-4 text-right font-mono">${c.saldo_deudor.toFixed(2)}</td>
                  <td class="py-2 px-4 text-right font-mono">${c.saldo_acreedor.toFixed(2)}</td>
                </tr>`;
          });
          const t = data.totales;
          html += `
                <tr class="font-bold border-t-2 border-stone-300">
                  <td class="py-2 px-4" colspan="2">Totales</td>
                  <td class="py-2 px-4 text-right">${t.debe.toFixed(2)}</td>
                  <td class="py-2 px-4 text-right">${t.haber.toFixed(2)}</td>
                  <td class="py-2 px-4 text-right">${t.saldo_deudor.toFixed(2)}</td>
                  <td class="py-2 px-4 text-right">${t.saldo_acreedor.toFixed(2)}</td>
                </tr>
              </tbody>
            </table>
          </div>`;
          document.getElementById("tablaComprobacion").innerHTML = html;
          lucide.createIcons();
        } catch (e) {
          document.getElementById("tablaComprobacion").innerHTML =
            `<p class="text-rose-500">${e.message}</p>`;
        }
        lucide.createIcons();
      }

      // Inicialización
      window.addEventListener("load", () => {
        lucide.createIcons();
        mostrarModulo("plan");
      });
      window.addEventListener("resize", () => {
        if (window.innerWidth >= 1024) {
          document
            .getElementById("sidebar")
            .classList.remove("-translate-x-full");
          document.getElementById("sidebarOverlay").classList.add("hidden");
        }
      });
    </script>
  </body>
</html>
