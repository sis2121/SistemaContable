<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plan de Cuentas</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 min-h-screen text-slate-100">
    <div class="max-w-6xl mx-auto py-10 px-4">
      <a href="index.html" class="text-sky-400 text-sm mb-6 inline-block"
        >← Volver al inicio</a
      >
      <div
        class="bg-slate-900/95 border border-slate-700 shadow-2xl rounded-3xl p-8"
      >
        <div
          class="flex flex-col md:flex-row md:items-center md:justify-between mb-10"
        >
          <div>
            <p class="text-sm uppercase tracking-[0.3em] text-sky-400">
              Gestión de cuentas
            </p>
            <h1 class="mt-3 text-4xl font-bold text-white">Plan de Cuentas</h1>
          </div>
          <button
            onclick="cargar()"
            class="mt-4 md:mt-0 rounded-full bg-sky-500 px-6 py-3 text-sm font-semibold text-slate-950 shadow-lg shadow-sky-500/20 transition hover:bg-sky-400"
          >
            Actualizar listado
          </button>
        </div>

        <!-- Agregar cuenta -->
        <div class="grid gap-6 lg:grid-cols-2 mb-8">
          <div
            class="space-y-4 p-6 bg-slate-950/80 border border-slate-800 rounded-3xl shadow-inner"
          >
            <h2 class="text-xl font-semibold text-white">
              Agregar nueva cuenta
            </h2>
            <div class="space-y-3">
              <label class="block text-sm text-slate-300">Código</label>
              <input
                id="codigo"
                placeholder="1, 1.1, 2.1.3"
                class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3"
              />
            </div>
            <div class="space-y-3">
              <label class="block text-sm text-slate-300">Nombre</label>
              <input
                id="nombre"
                placeholder="Activo corriente"
                class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3"
              />
            </div>
            <div class="space-y-3">
              <label class="block text-sm text-slate-300">Tipo</label>
              <select
                id="tipo"
                class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3"
              >
                <option value="ACTIVO">Activo</option>
                <option value="PASIVO">Pasivo</option>
                <option value="PATRIMONIO">Patrimonio</option>
                <option value="INGRESO">Ingreso</option>
                <option value="COSTO">Costo</option>
                <option value="GASTO">Gasto</option>
              </select>
            </div>
            <button
              onclick="guardar()"
              class="w-full rounded-2xl bg-sky-500 px-4 py-3 text-sm font-semibold text-slate-950 transition hover:bg-sky-400"
            >
              ➕ Agregar cuenta
            </button>
          </div>

          <!-- Eliminar por código -->
          <div
            class="space-y-4 p-6 bg-slate-950/80 border border-slate-800 rounded-3xl shadow-inner"
          >
            <h2 class="text-xl font-semibold text-white">
              Eliminar por código
            </h2>
            <div class="space-y-3">
              <label class="block text-sm text-slate-300">Código</label>
              <input
                id="codigoEliminar"
                placeholder="1.1, 2.3.4"
                class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3"
              />
            </div>
            <button
              onclick="eliminarPorCodigo()"
              class="w-full rounded-2xl bg-rose-500 px-4 py-3 text-sm font-semibold text-white transition hover:bg-rose-400"
            >
              🗑️ Eliminar cuenta
            </button>
          </div>
        </div>

        <!-- Listado -->
        <div
          class="p-6 bg-slate-950/80 border border-slate-800 rounded-3xl shadow-xl"
        >
          <h2 class="text-2xl font-semibold text-white mb-4">
            Cuentas registradas
          </h2>
          <ul id="lista" class="space-y-3"></ul>
        </div>
      </div>
    </div>
    <script src="app_plan_cuentas.js"></script>
  </body>
</html>
