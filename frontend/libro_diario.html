<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Libro Diario</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 min-h-screen text-slate-100">
    <div class="max-w-7xl mx-auto py-10 px-4">
      <a href="index.html" class="text-sky-400 text-sm mb-6 inline-block"
        >← Volver al inicio</a
      >
      <div
        class="bg-slate-900/95 border border-slate-700 shadow-2xl rounded-3xl p-8"
      >
        <h1 class="text-4xl font-bold text-white mb-10">Libro Diario</h1>

        <!-- Registrar asiento -->
        <div class="grid gap-6 lg:grid-cols-2 mb-10">
          <div
            class="space-y-4 p-6 bg-slate-950/80 border border-slate-800 rounded-3xl shadow-inner"
          >
            <h2 class="text-xl font-semibold text-white">Nuevo asiento</h2>
            <div class="space-y-3">
              <label class="block text-sm text-slate-300">Fecha</label>
              <input
                type="date"
                id="fecha"
                class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3"
              />
            </div>
            <div class="space-y-3">
              <label class="block text-sm text-slate-300">Glosa</label>
              <input
                id="glosa"
                placeholder="Descripción del asiento"
                class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3"
              />
            </div>
            <div id="lineasContainer">
              <div class="linea flex gap-2 mb-2">
                <input
                  placeholder="Código cuenta"
                  class="codigo w-1/3 rounded-2xl border border-slate-700 bg-slate-900 px-3 py-2"
                />
                <select
                  class="debeHaber w-1/4 rounded-2xl border border-slate-700 bg-slate-900 px-2 py-2"
                >
                  <option value="DEBE">DEBE</option>
                  <option value="HABER">HABER</option>
                </select>
                <input
                  type="number"
                  step="0.01"
                  placeholder="Monto"
                  class="monto w-1/3 rounded-2xl border border-slate-700 bg-slate-900 px-3 py-2"
                />
                <button
                  onclick="eliminarLinea(this)"
                  class="text-rose-400 px-2"
                >
                  ✕
                </button>
              </div>
            </div>
            <button
              onclick="agregarLinea()"
              class="text-sm text-sky-400 hover:underline"
            >
              + Agregar otra cuenta
            </button>
            <button
              onclick="registrarAsiento()"
              class="w-full mt-4 rounded-2xl bg-amber-500 px-4 py-3 text-sm font-semibold text-slate-950 hover:bg-amber-400"
            >
              📝 Registrar asiento
            </button>
          </div>

          <!-- Editar asiento (por ID) -->
          <div
            class="space-y-4 p-6 bg-slate-950/80 border border-slate-800 rounded-3xl shadow-inner"
          >
            <h2 class="text-xl font-semibold text-white">
              Editar / Eliminar asiento
            </h2>
            <div class="space-y-3">
              <label class="block text-sm text-slate-300">ID del asiento</label>
              <input
                id="idEditar"
                type="number"
                class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3"
              />
            </div>
            <div class="flex gap-4">
              <button
                onclick="cargarAsientoParaEditar()"
                class="flex-1 rounded-2xl bg-sky-500 px-4 py-3 text-sm font-semibold text-slate-950 hover:bg-sky-400"
              >
                ✏️ Cargar
              </button>
              <button
                onclick="eliminarAsiento()"
                class="flex-1 rounded-2xl bg-rose-500 px-4 py-3 text-sm font-semibold text-white hover:bg-rose-400"
              >
                🗑️ Eliminar
              </button>
            </div>
            <div id="editorAsiento" class="hidden space-y-3 mt-4">
              <input
                type="date"
                id="editFecha"
                class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3"
              />
              <input
                id="editGlosa"
                placeholder="Glosa"
                class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3"
              />
              <div id="editLineasContainer"></div>
              <button
                onclick="agregarLineaEdicion()"
                class="text-sm text-sky-400 hover:underline"
              >
                + Agregar línea
              </button>
              <button
                onclick="guardarEdicion()"
                class="w-full rounded-2xl bg-emerald-500 px-4 py-3 text-sm font-semibold text-slate-950 hover:bg-emerald-400"
              >
                💾 Guardar cambios
              </button>
            </div>
          </div>
        </div>

        <!-- Listado de asientos -->
        <div
          class="p-6 bg-slate-950/80 border border-slate-800 rounded-3xl shadow-xl"
        >
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-semibold text-white">
              Asientos registrados
            </h2>
            <button
              onclick="listarAsientos()"
              class="rounded-full bg-sky-500 px-6 py-3 text-sm font-semibold text-slate-950 hover:bg-sky-400"
            >
              Actualizar
            </button>
          </div>
          <div id="listaAsientos" class="space-y-6"></div>
        </div>
      </div>
    </div>
    <script src="app_libro_diario.js"></script>
  </body>
</html>
